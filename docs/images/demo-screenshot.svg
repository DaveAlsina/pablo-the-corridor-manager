<svg viewBox="0 0 420 700" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Phone frame -->
  <rect width="420" height="700" rx="32" fill="#1c1c1e"/>
  <rect x="8" y="8" width="404" height="684" rx="26" fill="#17212b"/>

  <!-- Status bar -->
  <text x="30" y="38" font-size="12" fill="#aab8c2">9:41</text>
  <text x="370" y="38" text-anchor="end" font-size="11" fill="#aab8c2">● WiFi</text>

  <!-- Chat header -->
  <rect x="8" y="46" width="404" height="50" fill="#212d3b"/>
  <circle cx="42" cy="71" r="16" fill="#3a4a5c"/>
  <text x="42" y="76" text-anchor="middle" font-size="14">🧹</text>
  <text x="68" y="68" font-size="13" font-weight="bold" fill="#e6edf3">Pablito</text>
  <text x="68" y="84" font-size="11" fill="#7a8a9a">online</text>

  <!-- Message 1 — bot welcome -->
  <rect x="20" y="110" width="280" height="70" rx="12" fill="#182533"/>
  <text x="35" y="132" font-size="12" fill="#e6edf3">Bienvenido Mijo 😉! You're</text>
  <text x="35" y="150" font-size="12" fill="#e6edf3">registered, Casimiro!</text>
  <text x="35" y="168" font-size="12" fill="#e6edf3">🔒 Private menu below:</text>
  <text x="310" y="176" font-size="10" fill="#6a7a8a">10:03</text>

  <!-- Menu keyboard -->
  <rect x="20" y="190" width="280" height="166" rx="12" fill="#182533"/>
  <!-- Row 1 -->
  <rect x="28" y="198" width="125" height="30" rx="6" fill="#2b5278"/>
  <text x="90" y="218" text-anchor="middle" font-size="11" fill="#e6edf3">📋 View Status</text>
  <rect x="165" y="198" width="127" height="30" rx="6" fill="#2b5278"/>
  <text x="228" y="218" text-anchor="middle" font-size="11" fill="#e6edf3">✅ Complete Task</text>
  <!-- Row 2 -->
  <rect x="28" y="234" width="125" height="30" rx="6" fill="#2b5278"/>
  <text x="90" y="254" text-anchor="middle" font-size="11" fill="#e6edf3">❌ Amend Task</text>
  <rect x="165" y="234" width="127" height="30" rx="6" fill="#2b5278"/>
  <text x="228" y="254" text-anchor="middle" font-size="11" fill="#e6edf3">❓ Ask Instructions</text>
  <!-- Row 3 -->
  <rect x="28" y="270" width="125" height="30" rx="6" fill="#2b5278"/>
  <text x="90" y="290" text-anchor="middle" font-size="11" fill="#e6edf3">🚫 Opt Out</text>
  <rect x="165" y="270" width="127" height="30" rx="6" fill="#2b5278"/>
  <text x="228" y="290" text-anchor="middle" font-size="11" fill="#e6edf3">📊 My Stats</text>
  <!-- Row 4 -->
  <rect x="28" y="306" width="264" height="30" rx="6" fill="#2b5278"/>
  <text x="160" y="326" text-anchor="middle" font-size="11" fill="#e6edf3">🗺️ Map   📝 Tasks   👁️ Opted Out</text>

  <!-- Message 2 — user taps complete task → category selection -->
  <rect x="20" y="368" width="280" height="34" rx="12" fill="#182533"/>
  <text x="35" y="390" font-size="12" fill="#e6edf3">✅ Complete a Task — select category:</text>

  <!-- Category buttons -->
  <rect x="20" y="408" width="280" height="114" rx="12" fill="#182533"/>
  <rect x="28" y="414" width="125" height="28" rx="6" fill="#2b5278"/>
  <text x="90" y="433" text-anchor="middle" font-size="11" fill="#e6edf3">🚽 Toilet</text>
  <rect x="165" y="414" width="127" height="28" rx="6" fill="#2b5278"/>
  <text x="228" y="433" text-anchor="middle" font-size="11" fill="#e6edf3">🚿 Shower</text>
  <rect x="28" y="448" width="125" height="28" rx="6" fill="#2b5278"/>
  <text x="90" y="467" text-anchor="middle" font-size="11" fill="#e6edf3">🍳 Kitchen</text>
  <rect x="165" y="448" width="127" height="28" rx="6" fill="#2b5278"/>
  <text x="228" y="467" text-anchor="middle" font-size="11" fill="#e6edf3">❄️ Fridge</text>
  <rect x="28" y="482" width="264" height="28" rx="6" fill="#2b5278"/>
  <text x="160" y="501" text-anchor="middle" font-size="11" fill="#e6edf3">🗑️ Trash   🚪 Hallway   🧺 Laundry</text>

  <!-- Confirmation message -->
  <rect x="20" y="534" width="280" height="66" rx="12" fill="#182533"/>
  <text x="35" y="556" font-size="11" fill="#a8d8a8">Eso es lo que necesitamos mijo!</text>
  <text x="35" y="573" font-size="12" font-weight="bold" fill="#e6edf3">✅ Great job, Casimiro!</text>
  <text x="35" y="590" font-size="11" fill="#e6edf3">Task: Toilet 1  ·  Your tasks: 3</text>
  <text x="35" y="606" font-size="11" fill="#e6edf3">📊 Remaining: 18</text>

  <!-- Bottom bar -->
  <rect x="8" y="628" width="404" height="56" rx="0" fill="#212d3b"/>
  <rect x="8" y="656" width="404" height="36" rx="0" fill="#212d3b"/>
  <rect x="20" y="636" width="320" height="34" rx="17" fill="#2c3e50"/>
  <text x="35" y="659" font-size="12" fill="#5a6a7a">Message</text>
  <circle cx="360" cy="653" r="14" fill="#2b5278"/>
  <text x="360" y="658" text-anchor="middle" font-size="14">🎙</text>
</svg>
